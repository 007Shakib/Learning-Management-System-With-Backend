<!DOCTYPE html>
<html>
<head>
    <title>Register - LMS</title>
    <link rel="stylesheet" href="log-reg.css">
</head>
<body>
<div class="auth-bg">
    <div class="auth-box">
        <h2>Register</h2>
        <form id="registerForm">
            <input type="text" id="registerName" name="name" placeholder="Full Name" required>
            <input type="email" id="registerEmail" name="email" placeholder="Email" required>
            <input type="password" id="registerPassword" name="password" placeholder="Password" required>
            <input type="password" id="registerConfirmPassword" name="confirm_password" placeholder="Confirm Password" required>
            <select id="registerRole" name="role" required>
                <option value="Student">Student</option>
                <option value="Instructor">Instructor</option>
                <option value="Admin">Admin</option>
            </select>
            <button type="submit">Create Account</button>
        </form>
        <div id="authMessage" class="auth-message"></div>
        <p class="switch">Already have an account? <a href="login.html">Login</a></p>
        <script src="../script.js"></script>
    </div>
</div>
</body>
</html>
